<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUA LABORATORY - Patient Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="patient.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-area">
                <i class="fas fa-flask logo-icon"></i>
                <h1>DUA LABORATORY</h1>
                <p>Diagnostic Management System v1.0</p>
            </div>
            <div class="datetime">
                <div class="current-date" id="currentDate"></div>
                <div class="current-time" id="currentTime"></div>
            </div>
        </header>

        <!-- Main Navigation -->
        <nav class="main-nav">
            <button class="nav-btn active" onclick="showSection('registration')"><i class="fas fa-user-plus"></i>
                Patient Registration</button>
            <button class="nav-btn" onclick="showSection('search')"><i class="fas fa-search"></i> Search
                Patients</button>
            <button class="nav-btn" onclick="showSection('history')"><i class="fas fa-history"></i> Patient
                History</button>
        </nav>

        <!-- Patient Registration Section -->
        <section id="registration" class="section active">
            <div class="card">
                <h2><i class="fas fa-notes-medical"></i> New Patient Registration</h2>

                <form id="patientForm" onsubmit="registerPatient(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Lab Number</label>
                            <input type="text" id="labNumber" placeholder="Enter lab number" required>
                        </div>
                        <div class="form-group">
                            <label>Date <span class="auto-badge">Auto</span></label>
                            <input type="text" id="regDate" readonly class="auto-field">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Patient Name *</label>
                            <input type="text" id="patientName" required placeholder="Enter full name">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Gender *</label>
                            <select id="gender" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <!-- Age field removed as requested -->
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Referred Doctor *</label>
                            <select id="doctor" required>
                                <option value="">Select Doctor</option>
                                <option value="DR SYED ABDUL QADAR SAHIB">DR SYED ABDUL QADAR SAHIB</option>
                                <option value="DR M.YAQOOB ZARKOON SAHIB">DR M.YAQOOB ZARKOON SAHIB</option>
                                <option value="DR MUMTAZANWAR SAHIBA">DR MUMTAZANWAR SAHIBA</option>
                                <option value="DR INAMULLAH KAKAR SAHIB">DR INAMULLAH KAKAR SAHIB</option>
                                <option value="DR M QAISER PANEZAI SAHIB">DR M QAISER PANEZAI SAHIB</option>
                                <option value="DR ZAIB UN NISA SAHIBA">DR ZAIB UN NISA SAHIBA</option>
                                <option value="DR ATTAULLAH SAAB">DR ATTAULLAH SAAB</option>
                                <option value="DR SALAAM SHAH SAAB">DR SALAAM SHAH SAAB</option>
                                <option value="DR SALAAM SHAH SAAB">DR ISMAIL SAAB</option>
                                <option value="DR SAAB">DR SAAB</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group full-width">
                            <label>Test Panels</label>
                            <div id="testPanels" class="test-grid">
                                <!-- Panels loaded from database.js -->
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary"><i class="fas fa-arrow-right"></i> Proceed to Test
                            Entry</button>
                        <button type="button" class="btn-secondary" onclick="resetForm()"><i class="fas fa-undo"></i>
                            Reset</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Search Section -->
        <section id="search" class="section">
            <div class="card">
                <h2><i class="fas fa-search"></i> Patient Search</h2>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by patient name or lab number..."
                        onkeyup="searchPatients()">
                    <button class="btn-search"><i class="fas fa-search"></i> Search</button>
                </div>

                <div id="searchResults" class="search-results">
                    <!-- Results appear here -->
                </div>
            </div>
        </section>

        <!-- Patient History Section -->
        <section id="history" class="section">
            <div class="card">
                <h2><i class="fas fa-clock"></i> Recent Patients</h2>
                <div id="patientHistory" class="history-list">
                    <!-- History loaded here -->
                </div>
            </div>
        </section>
    </div>

    <script src="database.js"></script>
    <script src="patient.js"></script>
</body>

</html>
