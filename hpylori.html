<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUA LABORATORY - Stool H. Pylori</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="stool.css"> <!-- reuse existing CSS -->
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-area">
                <i class="fas fa-flask logo-icon"></i>
                <h1>DUA LABORATORY</h1>
                <p>Stool H. Pylori Module</p>
            </div>
            <div class="patient-summary" id="patientSummary"></div>
            <button class="btn-back" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
        </header>

        <div class="stool-layout">
            <aside class="sidebar">
                <h3><i class="fas fa-flask"></i> Test</h3>
                <div id="testCheckboxes" class="test-checkboxes"></div>
            </aside>

            <main class="entry-area">
                <div class="card">
                    <h2><i class="fas fa-vial"></i> Stool H. Pylori Test Entry</h2>
                    <div id="hpyloriTestsTable" class="tests-table-container"></div>

                    <div class="action-buttons">
                        <button class="btn-primary" onclick="saveAndPrintReport()"><i class="fas fa-save"></i> Save & Print</button>
                        <button class="btn-secondary" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
                        <button class="btn-secondary" onclick="previewReport()"><i class="fas fa-eye"></i> Preview</button>
                    </div>
                </div>

                <div id="reportPreview" class="report-preview" style="display: none;">
                    <div class="card">
                        <h2><i class="fas fa-file-alt"></i> Report Preview</h2>
                        <div id="reportContent"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="database.js"></script>
    <script src="hpylori.js"></script>
</body>
</html>
